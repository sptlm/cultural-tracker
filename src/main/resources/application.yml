spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cultural_navigator}
    username: ${DB_USER:cultural_user}
    password: ${DB_PASSWORD:cultural_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${APP_PORT:8080}
