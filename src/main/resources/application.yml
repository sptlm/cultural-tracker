spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cultural_navigator}
    username: ${DB_USER:cultural_user}
    password: ${DB_PASSWORD:cultural_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false

server:
  port: ${APP_PORT:8080}
  forward-headers-strategy: framework
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/cultural}

app:
  yandex:
    geocoder-api-key: ${YANDEX_GEOCODER_API_KEY:}
  money:
    max: 1000000
  events:
    popular-limit: 9
    popular-lookback-days: 1
    evening-starts-at-hour: 18
    nearby-distance-km: 5.0
    high-rating-threshold: 4.5
  recommendations:
    favorite-category-score: 100
    budget-score: 50
    near-distance-km: 2.0
    near-distance-score: 30
    medium-distance-km: 5.0
    medium-distance-score: 15
  geo:
    earth-radius-km: 6371.0
    distance-scale: 1
    min-route-points: 2
  routes:
    home-limit: 3
    default-api-duration-minutes: 60
  ui:
    toast-duration-ms: 4500
    action-toast-duration-ms: 8000
  cache:
    ttl: 20m
