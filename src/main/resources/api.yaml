openapi: 3.0.3
info:
  title: Cultural Navigator Routes API
  version: 1.0.0
  description: API для CRUD операций над маршрутами.
servers:
  - url: http://localhost:8080/cultural
paths:
  /api/routes:
    get:
      tags: [Routes]
      operationId: getAllRoutes
      summary: Получить список маршрутов
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RouteResponse'
    post:
      tags: [Routes]
      operationId: createRoute
      summary: Создать маршрут
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteRequest'
      responses:
        '201':
          description: Маршрут создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteResponse'
  /api/routes/{id}:
    get:
      tags: [Routes]
      operationId: getRouteById
      summary: Получить маршрут по id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteResponse'
        '404':
          description: Маршрут не найден
    put:
      tags: [Routes]
      operationId: updateRoute
      summary: Обновить маршрут
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteRequest'
      responses:
        '200':
          description: Маршрут обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteResponse'
        '404':
          description: Маршрут не найден
    delete:
      tags: [Routes]
      operationId: deleteRoute
      summary: Удалить маршрут
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Маршрут удален
        '404':
          description: Маршрут не найден
components:
  schemas:
    RouteRequest:
      type: object
      required: [title, description, durationMinutes, budget, eventIds]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
          maxLength: 2000
        durationMinutes:
          type: integer
          format: int32
          minimum: 15
        budget:
          type: number
        isPublic:
          type: boolean
        eventIds:
          type: array
          minItems: 1
          items:
            type: integer
            format: int64
        authorId:
          type: integer
          format: int64
    RouteResponse:
      type: object
      required: [id, title, description, durationMinutes, budget, isPublic, authorId, authorUsername, itemsCount, eventIds]
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        durationMinutes:
          type: integer
          format: int32
        budget:
          type: number
        isPublic:
          type: boolean
        distanceKm:
          type: number
          format: double
        authorId:
          type: integer
          format: int64
        authorUsername:
          type: string
        itemsCount:
          type: integer
          format: int32
        eventIds:
          type: array
          items:
            type: integer
            format: int64
