services:
  app:
    build: .
    ports:
      - "${APP_HOST_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://${APP_DB_HOST:-db}:${APP_DB_PORT:-5432}/${DB_NAME:-cultural_navigator}
      DB_USER: ${DB_USER:-cultural_user}
      DB_PASSWORD: ${DB_PASSWORD:-cultural_password}
      REDIS_HOST: ${APP_REDIS_HOST:-redis}
      REDIS_PORT: ${APP_REDIS_PORT:-6379}
      APP_PORT: ${APP_PORT:-8080}
      SERVER_SERVLET_CONTEXT_PATH: ${SERVER_SERVLET_CONTEXT_PATH:-/cultural}
      YANDEX_GEOCODER_API_KEY: ${YANDEX_GEOCODER_API_KEY:-}
    networks:
      - web_network
      - cultural_internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=web_network
      - traefik.http.routers.cultural.rule=(Host(`${DOMAIN:-localhost}`) || Host(`${IP_HOST:-127.0.0.1}`)) && PathPrefix(`${SERVER_SERVLET_CONTEXT_PATH:-/cultural}`)
      - traefik.http.routers.cultural.entrypoints=web,websecure
      - traefik.http.routers.cultural.tls.certresolver=myresolver
      - traefik.http.routers.cultural.service=cultural
      - traefik.http.services.cultural.loadbalancer.server.port=8080
  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-cultural_navigator}
      POSTGRES_USER: ${DB_USER:-cultural_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cultural_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cultural_user} -d ${DB_NAME:-cultural_navigator}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - cultural_pg_data:/var/lib/postgresql/data
    networks:
      - cultural_internal

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cultural_internal

volumes:
  cultural_pg_data:

networks:
  web_network:
    external: true
  cultural_internal:
